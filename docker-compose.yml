services:
  gmboop:
    build: .
    ports:
      - "${PORT:-8080}:8080"
    volumes:
      - gmboop-data:/app/data
      - gmboop-logs:/app/logs
      - gmboop-backups:/app/backups
    environment:
      - NODE_ENV=production
      - PORT=8080
      - GMBOOP_LOG_LEVEL=${GMBOOP_LOG_LEVEL:-info}
      # Set GMBOOP_API_TOKEN in .env to enable authentication.
      # WARNING: If unset, API and WebSocket have no authentication.
      - GMBOOP_API_TOKEN=${GMBOOP_API_TOKEN:-}
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 512M
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  gmboop-data:
  gmboop-logs:
  gmboop-backups:
