<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Caisse claire (Snare) - Notes 38/40 -->

    <!-- Fut -->
    <rect x="20" y="48" width="88" height="32" rx="2" fill="#C0C0C0" stroke="#999" stroke-width="2"/>

    <!-- Cercle de tension haut -->
    <ellipse cx="64" cy="48" rx="46" ry="14" fill="none" stroke="#D4A843" stroke-width="2.5"/>

    <!-- Peau superieure -->
    <ellipse cx="64" cy="48" rx="44" ry="12" fill="#F5E6C8" stroke="#D4A843" stroke-width="1"/>

    <!-- Cercle de tension bas -->
    <ellipse cx="64" cy="80" rx="46" ry="14" fill="none" stroke="#D4A843" stroke-width="2"/>

    <!-- Tirants -->
    <line x1="22" y1="52" x2="22" y2="76" stroke="#D4A843" stroke-width="1.5"/>
    <line x1="40" y1="58" x2="40" y2="78" stroke="#D4A843" stroke-width="1.5"/>
    <line x1="64" y1="60" x2="64" y2="80" stroke="#D4A843" stroke-width="1.5"/>
    <line x1="88" y1="58" x2="88" y2="78" stroke="#D4A843" stroke-width="1.5"/>
    <line x1="106" y1="52" x2="106" y2="76" stroke="#D4A843" stroke-width="1.5"/>

    <!-- Timbre (snare wires) visible en bas -->
    <line x1="40" y1="80" x2="88" y2="80" stroke="#E8D5A3" stroke-width="0.5"/>
    <line x1="42" y1="82" x2="86" y2="82" stroke="#E8D5A3" stroke-width="0.5"/>
    <line x1="44" y1="84" x2="84" y2="84" stroke="#E8D5A3" stroke-width="0.5"/>

    <!-- Support -->
    <line x1="38" y1="90" x2="30" y2="118" stroke="#888" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="90" y1="90" x2="98" y2="118" stroke="#888" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="64" y1="94" x2="64" y2="120" stroke="#888" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Baguettes -->
    <line x1="36" y1="10" x2="52" y2="44" stroke="#D4934A" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="92" y1="10" x2="76" y2="44" stroke="#D4934A" stroke-width="2.5" stroke-linecap="round"/>

</svg>
