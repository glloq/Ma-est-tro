<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Contrebasse - GM 32 -->
  <g transform="rotate(45, 64, 64)">

    <!-- Pique -->
    <line x1="64" y1="120" x2="64" y2="126" stroke="#5C4A0E" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Manche (plus long et epais) -->
    <rect x="60" y="8" width="8" height="46" rx="1" fill="#8B6914" stroke="#5C4A0E" stroke-width="1"/>

    <!-- Volute (plus grosse) -->
    <path d="
      M 64 8
      C 64 4, 60 0, 56 0
      C 52 0, 52 4, 54 6
      C 56 8, 58 6, 58 4
    " fill="none" stroke="#5C4A0E" stroke-width="3" stroke-linecap="round"/>

    <!-- Chevilles -->
    <line x1="53" y1="2" x2="48" y2="0" stroke="#5C4A0E" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="53" y1="6" x2="48" y2="8" stroke="#5C4A0E" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="72" y1="4" x2="77" y2="2" stroke="#5C4A0E" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="72" y1="8" x2="77" y2="10" stroke="#5C4A0E" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Corps (epaules tombantes, tres large en bas) -->
    <path d="
      M 64 50
      C 76 50, 80 54, 82 62
      L 80 70
      C 76 72, 76 78, 80 80
      L 84 86
      C 90 92, 92 102, 90 110
      C 88 116, 78 120, 64 120
      C 50 120, 40 116, 38 110
      C 36 102, 38 92, 44 86
      L 48 80
      C 52 78, 52 72, 48 70
      L 46 62
      C 48 54, 52 50, 64 50 Z
    " fill="#A0652F" stroke="#7A4E24" stroke-width="2"/>

    <!-- Ouie F gauche -->
    <path d="M 50 76 C 48 80, 48 86, 50 90" fill="none" stroke="#3D300A" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Ouie F droite -->
    <path d="M 78 76 C 80 80, 80 86, 78 90" fill="none" stroke="#3D300A" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Chevalet -->
    <rect x="54" y="90" width="20" height="2.5" rx="0.5" fill="#5C4A0E"/>

    <!-- Cordier -->
    <path d="M 58 104 L 56 116 L 72 116 L 70 104 Z" fill="#1A1A1A" opacity="0.5"/>

    <!-- Cordes (4, epaisses) -->
    <line x1="61" y1="8" x2="61" y2="104" stroke="#E8D5A3" stroke-width="0.6" opacity="0.7"/>
    <line x1="63" y1="8" x2="63" y2="104" stroke="#E8D5A3" stroke-width="0.7" opacity="0.7"/>
    <line x1="65" y1="8" x2="65" y2="104" stroke="#E8D5A3" stroke-width="0.9" opacity="0.7"/>
    <line x1="67" y1="8" x2="67" y2="104" stroke="#E8D5A3" stroke-width="1.0" opacity="0.7"/>

  </g>
</svg>
