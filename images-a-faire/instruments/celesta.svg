<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Celesta - GM 8 -->

    <!-- Meuble (petit piano droit) -->
    <rect x="18" y="20" width="92" height="80" rx="4" fill="#5C4A0E" stroke="#3D300A" stroke-width="2"/>

    <!-- Panneau superieur (pupitre) -->
    <rect x="22" y="24" width="84" height="20" rx="2" fill="#8B6914" stroke="#5C4A0E" stroke-width="1"/>

    <!-- Clavier -->
    <rect x="22" y="70" width="84" height="20" rx="1" fill="#F5F5F5" stroke="#CCC" stroke-width="1"/>

    <!-- Touches noires -->
    <rect x="30" y="70" width="4" height="12" rx="0.5" fill="#111"/>
    <rect x="40" y="70" width="4" height="12" rx="0.5" fill="#111"/>
    <rect x="54" y="70" width="4" height="12" rx="0.5" fill="#111"/>
    <rect x="64" y="70" width="4" height="12" rx="0.5" fill="#111"/>
    <rect x="74" y="70" width="4" height="12" rx="0.5" fill="#111"/>
    <rect x="88" y="70" width="4" height="12" rx="0.5" fill="#111"/>

    <!-- Lames metalliques (visibles derriere le panneau) -->
    <rect x="26" y="46" width="6" height="20" rx="1" fill="#C0C0C0" stroke="#999" stroke-width="0.5"/>
    <rect x="34" y="46" width="6" height="18" rx="1" fill="#C0C0C0" stroke="#999" stroke-width="0.5"/>
    <rect x="42" y="46" width="6" height="16" rx="1" fill="#C0C0C0" stroke="#999" stroke-width="0.5"/>
    <rect x="50" y="46" width="6" height="14" rx="1" fill="#C0C0C0" stroke="#999" stroke-width="0.5"/>
    <rect x="58" y="46" width="6" height="12" rx="1" fill="#C0C0C0" stroke="#999" stroke-width="0.5"/>
    <rect x="66" y="46" width="6" height="10" rx="1" fill="#C0C0C0" stroke="#999" stroke-width="0.5"/>
    <rect x="74" y="46" width="6" height="9" rx="1" fill="#C0C0C0" stroke="#999" stroke-width="0.5"/>
    <rect x="82" y="46" width="6" height="8" rx="1" fill="#C0C0C0" stroke="#999" stroke-width="0.5"/>
    <rect x="90" y="46" width="6" height="7" rx="1" fill="#C0C0C0" stroke="#999" stroke-width="0.5"/>

    <!-- Pieds -->
    <rect x="22" y="100" width="4" height="16" rx="1" fill="#5C4A0E" stroke="#3D300A" stroke-width="1"/>
    <rect x="102" y="100" width="4" height="16" rx="1" fill="#5C4A0E" stroke="#3D300A" stroke-width="1"/>

    <!-- Pedale -->
    <rect x="52" y="112" width="24" height="4" rx="2" fill="#D4A843" stroke="#B8960F" stroke-width="1"/>

</svg>
