<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Orgue d'eglise (pipe organ) - GM 19 -->

    <!-- Buffet (meuble en bois) -->
    <rect x="14" y="38" width="100" height="80" rx="4" fill="#5C4A0E" stroke="#3D300A" stroke-width="2"/>

    <!-- Fronton decoratif -->
    <path d="M 14 38 L 64 16 L 114 38" fill="#5C4A0E" stroke="#3D300A" stroke-width="2"/>

    <!-- Tuyaux (rangee centrale, grands) -->
    <rect x="40" y="22" width="8" height="56" rx="3" fill="#C0C0C0" stroke="#999" stroke-width="1"/>
    <rect x="52" y="18" width="10" height="60" rx="4" fill="#C0C0C0" stroke="#999" stroke-width="1"/>
    <rect x="66" y="18" width="10" height="60" rx="4" fill="#C0C0C0" stroke="#999" stroke-width="1"/>
    <rect x="80" y="22" width="8" height="56" rx="3" fill="#C0C0C0" stroke="#999" stroke-width="1"/>

    <!-- Tuyaux lateraux (petits) -->
    <rect x="22" y="32" width="6" height="40" rx="2" fill="#C0C0C0" stroke="#999" stroke-width="1"/>
    <rect x="30" y="28" width="6" height="44" rx="2" fill="#C0C0C0" stroke="#999" stroke-width="1"/>
    <rect x="92" y="28" width="6" height="44" rx="2" fill="#C0C0C0" stroke="#999" stroke-width="1"/>
    <rect x="100" y="32" width="6" height="40" rx="2" fill="#C0C0C0" stroke="#999" stroke-width="1"/>

    <!-- Bouches des tuyaux -->
    <rect x="53" y="68" width="8" height="4" rx="1" fill="#777"/>
    <rect x="67" y="68" width="8" height="4" rx="1" fill="#777"/>

    <!-- Claviers (2 rangs) -->
    <rect x="28" y="84" width="72" height="8" rx="1" fill="#F5F5F5" stroke="#CCC" stroke-width="1"/>
    <rect x="28" y="94" width="72" height="8" rx="1" fill="#F5F5F5" stroke="#CCC" stroke-width="1"/>

    <!-- Touches noires -->
    <rect x="36" y="84" width="3" height="5" fill="#111"/>
    <rect x="44" y="84" width="3" height="5" fill="#111"/>
    <rect x="56" y="84" width="3" height="5" fill="#111"/>
    <rect x="64" y="84" width="3" height="5" fill="#111"/>
    <rect x="72" y="84" width="3" height="5" fill="#111"/>
    <rect x="84" y="84" width="3" height="5" fill="#111"/>

    <!-- Pedalier -->
    <rect x="34" y="108" width="60" height="6" rx="1" fill="#8B6914" stroke="#5C4A0E" stroke-width="1"/>

</svg>
