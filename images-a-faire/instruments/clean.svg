<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Guitare electrique clean (type Stratocaster) - GM 27 -->

  <!-- Manche (plus long et fin) -->
  <rect x="59" y="6" width="10" height="58" rx="2" fill="#8B6914" stroke="#5C4A0E" stroke-width="1.5"/>

  <!-- Frettes -->
  <line x1="59" y1="16" x2="69" y2="16" stroke="#D4A843" stroke-width="1"/>
  <line x1="59" y1="24" x2="69" y2="24" stroke="#D4A843" stroke-width="1"/>
  <line x1="59" y1="31" x2="69" y2="31" stroke="#D4A843" stroke-width="1"/>
  <line x1="59" y1="37" x2="69" y2="37" stroke="#D4A843" stroke-width="1"/>
  <line x1="59" y1="43" x2="69" y2="43" stroke="#D4A843" stroke-width="1"/>
  <line x1="59" y1="48" x2="69" y2="48" stroke="#D4A843" stroke-width="1"/>

  <!-- Tete (inclinee style Fender) -->
  <path d="M 57 6 L 57 2 C 57 0, 60 0, 60 2 L 60 6 Z" fill="#5C4A0E" stroke="#3D300A" stroke-width="1"/>
  <path d="M 62 6 L 62 1 C 62 -1, 72 -1, 72 2 L 72 6 Z" fill="#5C4A0E" stroke="#3D300A" stroke-width="1"/>
  <!-- Mecaniques -->
  <circle cx="56" cy="3" r="1.5" fill="#D4A843"/>
  <circle cx="56" cy="6" r="1.5" fill="#D4A843"/>
  <circle cx="73" cy="2" r="1.5" fill="#D4A843"/>
  <circle cx="73" cy="5" r="1.5" fill="#D4A843"/>

  <!-- Corps solid body (double cutaway) -->
  <path d="
    M 64 58
    C 54 58, 42 60, 40 68
    C 38 74, 44 78, 50 78
    L 54 78
    C 54 82, 50 84, 50 88
    C 50 92, 36 96, 36 106
    C 36 116, 44 124, 58 124
    C 68 124, 80 124, 88 118
    C 94 112, 92 104, 90 98
    C 88 90, 82 86, 78 82
    C 76 78, 78 76, 78 72
    C 78 68, 76 62, 74 60
    C 72 58, 68 58, 64 58 Z
  " fill="#C0392B" stroke="#922B21" stroke-width="2"/>

  <!-- Pickguard -->
  <path d="
    M 54 78
    C 54 82, 50 84, 50 88
    C 50 92, 42 94, 42 100
    C 42 106, 48 110, 56 110
    L 70 110
    L 70 90
    C 70 84, 64 78, 54 78 Z
  " fill="#1A1A1A" opacity="0.3"/>

  <!-- Micros (3 single coils) -->
  <rect x="50" y="86" width="20" height="3" rx="1" fill="#F0E6D3" stroke="#8B6914" stroke-width="0.5"/>
  <rect x="50" y="94" width="20" height="3" rx="1" fill="#F0E6D3" stroke="#8B6914" stroke-width="0.5"/>
  <rect x="50" y="102" width="20" height="3" rx="1" fill="#F0E6D3" stroke="#8B6914" stroke-width="0.5"/>

  <!-- Boutons volume/tone -->
  <circle cx="78" cy="100" r="3" fill="#F0E6D3" stroke="#8B6914" stroke-width="0.8"/>
  <circle cx="78" cy="110" r="3" fill="#F0E6D3" stroke="#8B6914" stroke-width="0.8"/>

  <!-- Chevalet -->
  <rect x="52" y="112" width="18" height="4" rx="1" fill="#D4A843" stroke="#8B6914" stroke-width="0.8"/>

  <!-- Cordes -->
  <line x1="60" y1="8" x2="56" y2="112" stroke="#E8D5A3" stroke-width="0.4" opacity="0.7"/>
  <line x1="62" y1="8" x2="58" y2="112" stroke="#E8D5A3" stroke-width="0.5" opacity="0.7"/>
  <line x1="63" y1="8" x2="60" y2="112" stroke="#E8D5A3" stroke-width="0.5" opacity="0.7"/>
  <line x1="65" y1="8" x2="62" y2="112" stroke="#E8D5A3" stroke-width="0.6" opacity="0.7"/>
  <line x1="66" y1="8" x2="64" y2="112" stroke="#E8D5A3" stroke-width="0.7" opacity="0.7"/>
  <line x1="68" y1="8" x2="66" y2="112" stroke="#E8D5A3" stroke-width="0.8" opacity="0.7"/>
</svg>
