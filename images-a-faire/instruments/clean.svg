<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Guitare electrique Stratocaster rouge/blanc - GM 27 -->
  <g transform="rotate(45, 64, 64)">

    <!-- Manche (erable) -->
    <rect x="59" y="4" width="10" height="48" rx="2" fill="#C19A49" stroke="#8B6914" stroke-width="1.5"/>

    <!-- Frettes -->
    <line x1="59" y1="12" x2="69" y2="12" stroke="#D4A843" stroke-width="1"/>
    <line x1="59" y1="19" x2="69" y2="19" stroke="#D4A843" stroke-width="1"/>
    <line x1="59" y1="25" x2="69" y2="25" stroke="#D4A843" stroke-width="1"/>
    <line x1="59" y1="30" x2="69" y2="30" stroke="#D4A843" stroke-width="1"/>
    <line x1="59" y1="35" x2="69" y2="35" stroke="#D4A843" stroke-width="1"/>
    <line x1="59" y1="39" x2="69" y2="39" stroke="#D4A843" stroke-width="1"/>
    <line x1="59" y1="43" x2="69" y2="43" stroke="#D4A843" stroke-width="1"/>

    <!-- Reperes de manche -->
    <circle cx="64" cy="22" r="1" fill="#F5F5F5" opacity="0.6"/>
    <circle cx="64" cy="33" r="1" fill="#F5F5F5" opacity="0.6"/>

    <!-- Tete Strat (forme allongee) -->
    <path d="
      M 59 4 L 57 4
      C 55 4, 54 2, 54 -2
      C 54 -6, 56 -8, 60 -8
      L 68 -8
      C 72 -8, 74 -6, 74 -2
      C 74 2, 73 4, 71 4
      L 69 4
    " fill="#C19A49" stroke="#8B6914" stroke-width="1.5"/>
    <!-- Mecaniques -->
    <circle cx="56" cy="-2" r="1.8" fill="#D4A843" stroke="#8B6914" stroke-width="0.5"/>
    <circle cx="56" cy="-6" r="1.8" fill="#D4A843" stroke="#8B6914" stroke-width="0.5"/>
    <circle cx="72" cy="-2" r="1.8" fill="#D4A843" stroke="#8B6914" stroke-width="0.5"/>
    <circle cx="72" cy="-6" r="1.8" fill="#D4A843" stroke="#8B6914" stroke-width="0.5"/>

    <!-- Corps Stratocaster (rouge) -->
    <path d="
      M 64 48
      C 54 46, 42 42, 40 48
      C 38 54, 46 56, 52 54
      C 46 62, 36 76, 36 92
      C 36 110, 50 122, 64 122
      C 78 122, 92 110, 92 92
      C 92 76, 82 62, 76 54
      C 82 56, 90 54, 88 48
      C 86 42, 74 46, 64 48 Z
    " fill="#CC3333" stroke="#A52828" stroke-width="2"/>

    <!-- Pickguard blanc (couvre la moitie gauche + micros) -->
    <path d="
      M 52 54
      C 46 62, 38 74, 38 88
      C 38 98, 42 108, 52 112
      L 72 112 L 72 108
      C 78 104, 80 98, 80 92
      C 80 80, 74 66, 68 56
      C 64 52, 56 52, 52 54 Z
    " fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1"/>

    <!-- Micros single coil (3) -->
    <rect x="46" y="74" width="22" height="3" rx="1.5" fill="#FFFFFF" stroke="#CCCCCC" stroke-width="0.8"/>
    <rect x="46" y="84" width="22" height="3" rx="1.5" fill="#FFFFFF" stroke="#CCCCCC" stroke-width="0.8"/>
    <rect x="46" y="94" width="22" height="3" rx="1.5" fill="#FFFFFF" stroke="#CCCCCC" stroke-width="0.8"/>

    <!-- Selecteur micro (sur le pickguard) -->
    <rect x="44" y="102" width="6" height="2" rx="1" fill="#D4A843"/>

    <!-- Boutons volume/tone (sur la droite du pickguard) -->
    <circle cx="74" cy="96" r="2.5" fill="#F5F5F5" stroke="#CCCCCC" stroke-width="0.8"/>
    <circle cx="76" cy="104" r="2.5" fill="#F5F5F5" stroke="#CCCCCC" stroke-width="0.8"/>

    <!-- Chevalet / tremolo -->
    <rect x="50" y="108" width="18" height="6" rx="1" fill="#D4A843" stroke="#8B6914" stroke-width="0.8"/>
    <!-- Pontets du chevalet -->
    <line x1="53" y1="108" x2="53" y2="114" stroke="#8B6914" stroke-width="0.5"/>
    <line x1="56" y1="108" x2="56" y2="114" stroke="#8B6914" stroke-width="0.5"/>
    <line x1="59" y1="108" x2="59" y2="114" stroke="#8B6914" stroke-width="0.5"/>
    <line x1="62" y1="108" x2="62" y2="114" stroke="#8B6914" stroke-width="0.5"/>
    <line x1="65" y1="108" x2="65" y2="114" stroke="#8B6914" stroke-width="0.5"/>

    <!-- Jack (cote droit) -->
    <circle cx="88" cy="100" r="2" fill="#D4A843" stroke="#8B6914" stroke-width="0.5"/>

    <!-- Cordes -->
    <line x1="60" y1="-6" x2="53" y2="108" stroke="#E8D5A3" stroke-width="0.4" opacity="0.6"/>
    <line x1="62" y1="-6" x2="55" y2="108" stroke="#E8D5A3" stroke-width="0.4" opacity="0.6"/>
    <line x1="63" y1="-6" x2="57" y2="108" stroke="#E8D5A3" stroke-width="0.5" opacity="0.6"/>
    <line x1="65" y1="-6" x2="60" y2="108" stroke="#E8D5A3" stroke-width="0.5" opacity="0.6"/>
    <line x1="66" y1="-6" x2="62" y2="108" stroke="#E8D5A3" stroke-width="0.6" opacity="0.6"/>
    <line x1="68" y1="-6" x2="65" y2="108" stroke="#E8D5A3" stroke-width="0.7" opacity="0.6"/>

  </g>
</svg>
