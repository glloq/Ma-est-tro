<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Guitare electrique clean - GM 27 - rotation 45° -->
  <g transform="rotate(45, 64, 64)">

    <!-- Manche -->
    <rect x="59" y="6" width="10" height="48" rx="2" fill="#8B6914" stroke="#5C4A0E" stroke-width="1.5"/>

    <!-- Frettes -->
    <line x1="59" y1="14" x2="69" y2="14" stroke="#D4A843" stroke-width="1"/>
    <line x1="59" y1="21" x2="69" y2="21" stroke="#D4A843" stroke-width="1"/>
    <line x1="59" y1="27" x2="69" y2="27" stroke="#D4A843" stroke-width="1"/>
    <line x1="59" y1="33" x2="69" y2="33" stroke="#D4A843" stroke-width="1"/>
    <line x1="59" y1="38" x2="69" y2="38" stroke="#D4A843" stroke-width="1"/>
    <line x1="59" y1="43" x2="69" y2="43" stroke="#D4A843" stroke-width="1"/>

    <!-- Tete -->
    <rect x="56" y="0" width="16" height="10" rx="3" fill="#5C4A0E" stroke="#3D300A" stroke-width="1.5"/>
    <circle cx="58" cy="3" r="1.8" fill="#D4A843"/>
    <circle cx="58" cy="7" r="1.8" fill="#D4A843"/>
    <circle cx="70" cy="3" r="1.8" fill="#D4A843"/>
    <circle cx="70" cy="7" r="1.8" fill="#D4A843"/>

    <!-- Corps solid body (double cutaway) -->
    <path d="
      M 64 50
      C 56 50, 46 52, 44 60
      C 42 66, 50 68, 54 66
      C 48 74, 38 84, 38 96
      C 38 110, 50 120, 64 120
      C 78 120, 90 110, 90 96
      C 90 84, 80 74, 74 66
      C 78 68, 86 66, 84 60
      C 82 52, 72 50, 64 50 Z
    " fill="#C0392B" stroke="#922B21" stroke-width="2"/>

    <!-- Pickguard -->
    <path d="
      M 54 66 C 48 74, 42 82, 42 92
      C 42 100, 48 104, 56 104
      L 66 104 L 66 84
      C 66 76, 60 68, 54 66 Z
    " fill="#1A1A1A" opacity="0.2"/>

    <!-- Micros (3 single coils) -->
    <rect x="48" y="78" width="18" height="3" rx="1" fill="#F0E6D3" stroke="#8B6914" stroke-width="0.5"/>
    <rect x="48" y="86" width="18" height="3" rx="1" fill="#F0E6D3" stroke="#8B6914" stroke-width="0.5"/>
    <rect x="48" y="94" width="18" height="3" rx="1" fill="#F0E6D3" stroke="#8B6914" stroke-width="0.5"/>

    <!-- Boutons -->
    <circle cx="78" cy="92" r="2.5" fill="#F0E6D3" stroke="#8B6914" stroke-width="0.8"/>
    <circle cx="80" cy="102" r="2.5" fill="#F0E6D3" stroke="#8B6914" stroke-width="0.8"/>

    <!-- Chevalet -->
    <rect x="50" y="106" width="16" height="4" rx="1" fill="#D4A843" stroke="#8B6914" stroke-width="0.8"/>

    <!-- Cordes -->
    <line x1="60" y1="8" x2="54" y2="106" stroke="#E8D5A3" stroke-width="0.4" opacity="0.7"/>
    <line x1="62" y1="8" x2="56" y2="106" stroke="#E8D5A3" stroke-width="0.5" opacity="0.7"/>
    <line x1="63" y1="8" x2="58" y2="106" stroke="#E8D5A3" stroke-width="0.5" opacity="0.7"/>
    <line x1="65" y1="8" x2="60" y2="106" stroke="#E8D5A3" stroke-width="0.6" opacity="0.7"/>
    <line x1="67" y1="8" x2="62" y2="106" stroke="#E8D5A3" stroke-width="0.7" opacity="0.7"/>
    <line x1="68" y1="8" x2="64" y2="106" stroke="#E8D5A3" stroke-width="0.8" opacity="0.7"/>

  </g>
</svg>
