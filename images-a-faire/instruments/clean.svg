<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Guitare electrique clean (type Strat) - GM 27 -->

  <!-- Manche -->
  <rect x="59" y="6" width="10" height="52" rx="2" fill="#8B6914" stroke="#5C4A0E" stroke-width="1.5"/>

  <!-- Frettes -->
  <line x1="59" y1="14" x2="69" y2="14" stroke="#D4A843" stroke-width="1"/>
  <line x1="59" y1="22" x2="69" y2="22" stroke="#D4A843" stroke-width="1"/>
  <line x1="59" y1="29" x2="69" y2="29" stroke="#D4A843" stroke-width="1"/>
  <line x1="59" y1="35" x2="69" y2="35" stroke="#D4A843" stroke-width="1"/>
  <line x1="59" y1="40" x2="69" y2="40" stroke="#D4A843" stroke-width="1"/>
  <line x1="59" y1="45" x2="69" y2="45" stroke="#D4A843" stroke-width="1"/>

  <!-- Tete -->
  <rect x="56" y="0" width="16" height="10" rx="3" fill="#5C4A0E" stroke="#3D300A" stroke-width="1.5"/>
  <!-- Mecaniques -->
  <circle cx="58" cy="3" r="1.8" fill="#D4A843"/>
  <circle cx="58" cy="7" r="1.8" fill="#D4A843"/>
  <circle cx="70" cy="3" r="1.8" fill="#D4A843"/>
  <circle cx="70" cy="7" r="1.8" fill="#D4A843"/>

  <!-- Corps solid body (double cutaway symetrique) -->
  <path d="
    M 64 54
    C 52 54, 42 56, 40 64
    C 38 72, 48 72, 52 70
    C 48 78, 38 86, 38 98
    C 38 112, 50 124, 64 124
    C 78 124, 90 112, 90 98
    C 90 86, 80 78, 76 70
    C 80 72, 90 72, 88 64
    C 86 56, 76 54, 64 54 Z
  " fill="#C0392B" stroke="#922B21" stroke-width="2"/>

  <!-- Pickguard -->
  <path d="
    M 52 70
    C 48 78, 42 84, 42 94
    C 42 102, 48 108, 56 108
    L 68 108
    L 68 88
    C 68 80, 60 72, 52 70 Z
  " fill="#1A1A1A" opacity="0.25"/>

  <!-- Micros (3 single coils) -->
  <rect x="48" y="82" width="20" height="3" rx="1" fill="#F0E6D3" stroke="#8B6914" stroke-width="0.5"/>
  <rect x="48" y="90" width="20" height="3" rx="1" fill="#F0E6D3" stroke="#8B6914" stroke-width="0.5"/>
  <rect x="48" y="98" width="20" height="3" rx="1" fill="#F0E6D3" stroke="#8B6914" stroke-width="0.5"/>

  <!-- Boutons volume/tone -->
  <circle cx="80" cy="96" r="2.5" fill="#F0E6D3" stroke="#8B6914" stroke-width="0.8"/>
  <circle cx="80" cy="106" r="2.5" fill="#F0E6D3" stroke="#8B6914" stroke-width="0.8"/>

  <!-- Chevalet -->
  <rect x="50" y="110" width="18" height="4" rx="1" fill="#D4A843" stroke="#8B6914" stroke-width="0.8"/>

  <!-- Cordes -->
  <line x1="60" y1="8" x2="54" y2="110" stroke="#E8D5A3" stroke-width="0.4" opacity="0.7"/>
  <line x1="61.5" y1="8" x2="56" y2="110" stroke="#E8D5A3" stroke-width="0.5" opacity="0.7"/>
  <line x1="63" y1="8" x2="58" y2="110" stroke="#E8D5A3" stroke-width="0.5" opacity="0.7"/>
  <line x1="65" y1="8" x2="60" y2="110" stroke="#E8D5A3" stroke-width="0.6" opacity="0.7"/>
  <line x1="66.5" y1="8" x2="62" y2="110" stroke="#E8D5A3" stroke-width="0.7" opacity="0.7"/>
  <line x1="68" y1="8" x2="64" y2="110" stroke="#E8D5A3" stroke-width="0.8" opacity="0.7"/>
</svg>
