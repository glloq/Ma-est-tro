<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Harpe classique de concert - GM 46 -->
  <g transform="rotate(45, 64, 64)">

    <!-- Colonne (pilier, legerement courbe, a gauche) -->
    <path d="M 36 14 C 34 14, 32 18, 32 22 L 32 108 C 32 112, 34 114, 36 114" fill="none" stroke="#8B6914" stroke-width="5" stroke-linecap="round"/>

    <!-- Console / Cou (courbe du haut, relie colonne au corps) -->
    <path d="M 36 14 C 42 8, 56 4, 70 4 C 80 4, 86 8, 90 14" fill="none" stroke="#8B6914" stroke-width="4" stroke-linecap="round"/>

    <!-- Ornement au sommet de la colonne -->
    <circle cx="36" cy="12" r="3" fill="#D4A843" stroke="#8B6914" stroke-width="1"/>

    <!-- Corps / Table d'harmonie (caisse triangulaire, etroite en haut, large en bas) -->
    <path d="
      M 90 14
      L 92 18
      L 88 44
      L 80 72
      L 68 98
      L 54 112
      L 42 114
      L 36 114
      L 38 110
      L 50 100
      L 64 78
      L 76 54
      L 84 32
      L 88 18
      Z
    " fill="#D4934A" stroke="#8B6914" stroke-width="1.5"/>

    <!-- Detail: bande sombre sur le bord du corps -->
    <path d="M 92 18 L 88 44 L 80 72 L 68 98 L 54 112 L 42 114" fill="none" stroke="#7A4E24" stroke-width="2"/>

    <!-- Chevillier (mecaniques le long de la console) -->
    <circle cx="46" cy="6" r="1.5" fill="#D4A843"/>
    <circle cx="54" cy="4" r="1.5" fill="#D4A843"/>
    <circle cx="62" cy="4" r="1.5" fill="#D4A843"/>
    <circle cx="70" cy="4" r="1.5" fill="#D4A843"/>
    <circle cx="78" cy="6" r="1.5" fill="#D4A843"/>
    <circle cx="84" cy="9" r="1.5" fill="#D4A843"/>
    <circle cx="88" cy="13" r="1.5" fill="#D4A843"/>

    <!-- Cordes (7 representees, de la console au corps) -->
    <line x1="46" y1="8" x2="38" y2="110" stroke="#E8D5A3" stroke-width="0.4" opacity="0.6"/>
    <line x1="54" y1="6" x2="42" y2="106" stroke="#E8D5A3" stroke-width="0.4" opacity="0.6"/>
    <line x1="62" y1="6" x2="48" y2="102" stroke="#E8D5A3" stroke-width="0.5" opacity="0.6"/>
    <line x1="70" y1="6" x2="56" y2="94" stroke="#E8D5A3" stroke-width="0.5" opacity="0.6"/>
    <line x1="78" y1="8" x2="64" y2="82" stroke="#E8D5A3" stroke-width="0.6" opacity="0.6"/>
    <line x1="84" y1="11" x2="72" y2="66" stroke="#E8D5A3" stroke-width="0.6" opacity="0.6"/>
    <line x1="88" y1="16" x2="80" y2="48" stroke="#E8D5A3" stroke-width="0.7" opacity="0.6"/>

    <!-- Socle / Pedalier -->
    <rect x="28" y="112" width="18" height="6" rx="2" fill="#5C4A0E" stroke="#3D300A" stroke-width="1"/>

    <!-- Pieds -->
    <line x1="30" y1="118" x2="28" y2="122" stroke="#5C4A0E" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="44" y1="118" x2="46" y2="122" stroke="#5C4A0E" stroke-width="2.5" stroke-linecap="round"/>

  </g>
</svg>
