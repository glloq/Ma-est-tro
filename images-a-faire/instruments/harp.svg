<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Harpe - GM 46 -->
  <g transform="rotate(45, 64, 64)">

    <!-- Colonne (pilier vertical gauche) -->
    <path d="
      M 38 14 C 36 14, 34 16, 34 18
      L 34 114
      C 34 118, 36 120, 40 120
    " fill="none" stroke="#8B6914" stroke-width="4" stroke-linecap="round"/>

    <!-- Console (partie courbe du haut) -->
    <path d="
      M 38 14
      C 42 10, 50 8, 58 8
      C 70 8, 80 10, 88 16
    " fill="none" stroke="#8B6914" stroke-width="4" stroke-linecap="round"/>

    <!-- Chevillier (mecaniques le long de la console) -->
    <circle cx="48" cy="9" r="1.5" fill="#D4A843"/>
    <circle cx="56" cy="8" r="1.5" fill="#D4A843"/>
    <circle cx="64" cy="9" r="1.5" fill="#D4A843"/>
    <circle cx="72" cy="11" r="1.5" fill="#D4A843"/>
    <circle cx="80" cy="13" r="1.5" fill="#D4A843"/>
    <circle cx="86" cy="16" r="1.5" fill="#D4A843"/>

    <!-- Table d'harmonie (caisse de resonance, triangle droit) -->
    <path d="
      M 88 16
      L 92 20
      C 94 24, 94 30, 92 40
      C 88 60, 76 90, 56 114
      C 52 118, 46 120, 40 120
      L 44 118
      C 50 116, 62 104, 72 86
      C 82 68, 88 46, 90 28
      L 88 16 Z
    " fill="#D4934A" stroke="#8B6914" stroke-width="2"/>

    <!-- Cordes (7 cordes representees) -->
    <line x1="48" y1="12" x2="42" y2="116" stroke="#E8D5A3" stroke-width="0.4" opacity="0.6"/>
    <line x1="56" y1="10" x2="46" y2="114" stroke="#E8D5A3" stroke-width="0.4" opacity="0.6"/>
    <line x1="64" y1="11" x2="50" y2="112" stroke="#E8D5A3" stroke-width="0.5" opacity="0.6"/>
    <line x1="72" y1="13" x2="56" y2="108" stroke="#E8D5A3" stroke-width="0.5" opacity="0.6"/>
    <line x1="80" y1="16" x2="62" y2="104" stroke="#E8D5A3" stroke-width="0.6" opacity="0.6"/>
    <line x1="85" y1="19" x2="68" y2="98" stroke="#E8D5A3" stroke-width="0.6" opacity="0.6"/>
    <line x1="88" y1="24" x2="72" y2="92" stroke="#E8D5A3" stroke-width="0.7" opacity="0.6"/>

    <!-- Pieds -->
    <line x1="36" y1="120" x2="32" y2="126" stroke="#5C4A0E" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="44" y1="120" x2="48" y2="126" stroke="#5C4A0E" stroke-width="2.5" stroke-linecap="round"/>

  </g>
</svg>
