<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Clavecin (harpsichord) - GM 6 -->

    <!-- Corps (forme de piano mais plus fin et anguleux) -->
    <path d="
      M 14 24
      L 14 104
      L 28 108
      L 60 110
      C 80 110, 96 100, 104 84
      C 110 68, 108 48, 100 36
      L 86 24
      L 14 24 Z
    " fill="#5C4A0E" stroke="#3D300A" stroke-width="2"/>

    <!-- Couvercle ouvert -->
    <path d="
      M 86 24
      L 100 36
      C 108 48, 110 68, 104 84
      C 96 100, 80 110, 60 110
    " fill="none" stroke="#8B6914" stroke-width="1.5"/>

    <!-- Table d'harmonie (interieur visible) -->
    <path d="
      M 26 28
      L 26 100
      L 58 106
      C 76 106, 92 96, 100 82
      C 106 66, 104 48, 98 38
      L 84 28
      L 26 28 Z
    " fill="#D4934A" stroke="#8B6914" stroke-width="1"/>

    <!-- Rosace (decoration sur la table) -->
    <circle cx="60" cy="64" r="8" fill="none" stroke="#8B6914" stroke-width="1.5"/>
    <circle cx="60" cy="64" r="5" fill="none" stroke="#8B6914" stroke-width="0.8"/>

    <!-- Clavier (2 rangs) -->
    <rect x="14" y="24" width="8" height="80" rx="1" fill="#1A1A1A" stroke="#111" stroke-width="1"/>
    <rect x="14" y="28" width="6" height="4" fill="#F5F5F5"/>
    <rect x="14" y="34" width="6" height="4" fill="#F5F5F5"/>
    <rect x="14" y="40" width="6" height="4" fill="#F5F5F5"/>
    <rect x="14" y="46" width="6" height="4" fill="#F5F5F5"/>
    <rect x="14" y="52" width="6" height="4" fill="#F5F5F5"/>
    <rect x="14" y="58" width="6" height="4" fill="#F5F5F5"/>
    <rect x="14" y="64" width="6" height="4" fill="#F5F5F5"/>
    <rect x="14" y="70" width="6" height="4" fill="#F5F5F5"/>
    <rect x="14" y="76" width="6" height="4" fill="#F5F5F5"/>
    <rect x="14" y="82" width="6" height="4" fill="#F5F5F5"/>
    <rect x="14" y="88" width="6" height="4" fill="#F5F5F5"/>
    <rect x="14" y="94" width="6" height="4" fill="#F5F5F5"/>

    <!-- Pieds tournes -->
    <line x1="20" y1="108" x2="16" y2="120" stroke="#5C4A0E" stroke-width="3" stroke-linecap="round"/>
    <line x1="56" y1="110" x2="56" y2="122" stroke="#5C4A0E" stroke-width="3" stroke-linecap="round"/>
    <line x1="90" y1="96" x2="94" y2="108" stroke="#5C4A0E" stroke-width="3" stroke-linecap="round"/>

</svg>
