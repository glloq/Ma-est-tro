<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Guitare jazz archtop - GM 26 -->

  <!-- Manche -->
  <rect x="58" y="8" width="12" height="56" rx="2" fill="#8B6914" stroke="#5C4A0E" stroke-width="1.5"/>

  <!-- Frettes -->
  <line x1="58" y1="18" x2="70" y2="18" stroke="#D4A843" stroke-width="1"/>
  <line x1="58" y1="27" x2="70" y2="27" stroke="#D4A843" stroke-width="1"/>
  <line x1="58" y1="35" x2="70" y2="35" stroke="#D4A843" stroke-width="1"/>
  <line x1="58" y1="42" x2="70" y2="42" stroke="#D4A843" stroke-width="1"/>
  <line x1="58" y1="48" x2="70" y2="48" stroke="#D4A843" stroke-width="1"/>

  <!-- Tete -->
  <rect x="55" y="2" width="18" height="10" rx="3" fill="#5C4A0E" stroke="#3D300A" stroke-width="1.5"/>
  <!-- Mecaniques -->
  <circle cx="57" cy="5" r="2" fill="#D4A843"/>
  <circle cx="57" cy="9" r="2" fill="#D4A843"/>
  <circle cx="71" cy="5" r="2" fill="#D4A843"/>
  <circle cx="71" cy="9" r="2" fill="#D4A843"/>

  <!-- Corps archtop (plus large, plus rond que la classique) -->
  <path d="
    M 64 58
    C 80 58, 88 64, 88 72
    C 88 82, 82 88, 82 91
    C 82 94, 94 100, 94 110
    C 94 120, 80 126, 64 126
    C 48 126, 34 120, 34 110
    C 34 100, 46 94, 46 91
    C 46 88, 40 82, 40 72
    C 40 64, 48 58, 64 58 Z
  " fill="#C17D2F" stroke="#8B6914" stroke-width="2"/>

  <!-- Filet de binding (contour decoratif interieur) -->
  <path d="
    M 64 60
    C 79 60, 86 65, 86 72
    C 86 81, 81 87, 81 90
    C 81 93, 92 99, 92 110
    C 92 119, 79 124, 64 124
    C 49 124, 36 119, 36 110
    C 36 99, 47 93, 47 90
    C 47 87, 42 81, 42 72
    C 42 65, 49 60, 64 60 Z
  " fill="none" stroke="#F0E6D3" stroke-width="0.8" opacity="0.6"/>

  <!-- Ouie F gauche -->
  <path d="M 50 76 C 48 80, 48 84, 50 88 C 52 84, 52 80, 50 82" fill="none" stroke="#3D300A" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Ouie F droite -->
  <path d="M 78 76 C 80 80, 80 84, 78 88 C 76 84, 76 80, 78 82" fill="none" stroke="#3D300A" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Pickguard flottant -->
  <path d="M 42 78 C 44 86, 48 94, 56 100 L 56 86 C 50 82, 44 78, 42 78 Z" fill="#1A1A1A" opacity="0.25"/>

  <!-- Micro humbucker (au manche) -->
  <rect x="54" y="72" width="20" height="5" rx="2" fill="#2C2C2C" stroke="#1A1A1A" stroke-width="0.8"/>

  <!-- Chevalet flottant -->
  <rect x="54" y="104" width="20" height="3" rx="1" fill="#5C4A0E"/>

  <!-- Cordier trapeze -->
  <path d="M 54 120 L 50 126 L 78 126 L 74 120 Z" fill="#D4A843" stroke="#8B6914" stroke-width="0.8"/>

  <!-- Cordes -->
  <line x1="59" y1="12" x2="57" y2="120" stroke="#E8D5A3" stroke-width="0.5" opacity="0.7"/>
  <line x1="61" y1="12" x2="60" y2="120" stroke="#E8D5A3" stroke-width="0.5" opacity="0.7"/>
  <line x1="63" y1="12" x2="62" y2="120" stroke="#E8D5A3" stroke-width="0.6" opacity="0.7"/>
  <line x1="65" y1="12" x2="66" y2="120" stroke="#E8D5A3" stroke-width="0.6" opacity="0.7"/>
  <line x1="67" y1="12" x2="68" y2="120" stroke="#E8D5A3" stroke-width="0.7" opacity="0.7"/>
  <line x1="69" y1="12" x2="71" y2="120" stroke="#E8D5A3" stroke-width="0.8" opacity="0.7"/>
</svg>
