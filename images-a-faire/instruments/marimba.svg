<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Marimba - GM 12 -->
  <g transform="rotate(20, 64, 64)">

    <!-- Cadre -->
    <line x1="10" y1="34" x2="118" y2="34" stroke="#8B6914" stroke-width="2"/>

    <!-- Lames en bois (graduees, plus larges que xylophone) -->
    <rect x="14" y="18" width="12" height="18" rx="2" fill="#A0652F" stroke="#7A4E24" stroke-width="1"/>
    <rect x="28" y="18" width="12" height="17" rx="2" fill="#8B6914" stroke="#5C4A0E" stroke-width="1"/>
    <rect x="42" y="18" width="12" height="16" rx="2" fill="#A0652F" stroke="#7A4E24" stroke-width="1"/>
    <rect x="56" y="18" width="12" height="15" rx="2" fill="#8B6914" stroke="#5C4A0E" stroke-width="1"/>
    <rect x="70" y="18" width="12" height="14" rx="2" fill="#A0652F" stroke="#7A4E24" stroke-width="1"/>
    <rect x="84" y="20" width="12" height="13" rx="2" fill="#8B6914" stroke="#5C4A0E" stroke-width="1"/>
    <rect x="98" y="22" width="12" height="12" rx="2" fill="#A0652F" stroke="#7A4E24" stroke-width="1"/>

    <!-- Tubes resonateurs (longs, en dessous) -->
    <rect x="16" y="38" width="8" height="56" rx="3" fill="#D4A843" stroke="#B8960F" stroke-width="1"/>
    <rect x="30" y="38" width="8" height="50" rx="3" fill="#D4A843" stroke="#B8960F" stroke-width="1"/>
    <rect x="44" y="38" width="8" height="44" rx="3" fill="#D4A843" stroke="#B8960F" stroke-width="1"/>
    <rect x="58" y="38" width="8" height="38" rx="3" fill="#D4A843" stroke="#B8960F" stroke-width="1"/>
    <rect x="72" y="38" width="8" height="32" rx="3" fill="#D4A843" stroke="#B8960F" stroke-width="1"/>
    <rect x="86" y="38" width="8" height="26" rx="3" fill="#D4A843" stroke="#B8960F" stroke-width="1"/>
    <rect x="100" y="38" width="8" height="20" rx="3" fill="#D4A843" stroke="#B8960F" stroke-width="1"/>

    <!-- Pieds -->
    <line x1="20" y1="94" x2="16" y2="108" stroke="#8B6914" stroke-width="3" stroke-linecap="round"/>
    <line x1="108" y1="66" x2="112" y2="80" stroke="#8B6914" stroke-width="3" stroke-linecap="round"/>

    <!-- Mailloches -->
    <line x1="32" y1="4" x2="42" y2="18" stroke="#8B6914" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="42" cy="18" r="4" fill="#333" stroke="#222" stroke-width="1"/>
    <line x1="86" y1="6" x2="76" y2="20" stroke="#8B6914" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="76" cy="20" r="4" fill="#333" stroke="#222" stroke-width="1"/>

  </g>
</svg>
