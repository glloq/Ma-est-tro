<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Guitare classique (nylon) - Style flat/line-art -->

  <!-- Manche -->
  <rect x="58" y="8" width="12" height="60" rx="2" fill="#8B6914" stroke="#5C4A0E" stroke-width="1.5"/>

  <!-- Frettes -->
  <line x1="58" y1="20" x2="70" y2="20" stroke="#D4A843" stroke-width="1"/>
  <line x1="58" y1="30" x2="70" y2="30" stroke="#D4A843" stroke-width="1"/>
  <line x1="58" y1="39" x2="70" y2="39" stroke="#D4A843" stroke-width="1"/>
  <line x1="58" y1="47" x2="70" y2="47" stroke="#D4A843" stroke-width="1"/>
  <line x1="58" y1="54" x2="70" y2="54" stroke="#D4A843" stroke-width="1"/>

  <!-- Tete -->
  <rect x="55" y="2" width="18" height="10" rx="3" fill="#5C4A0E" stroke="#3D300A" stroke-width="1.5"/>
  <!-- Mecaniques -->
  <circle cx="57" cy="5" r="2" fill="#D4A843"/>
  <circle cx="57" cy="9" r="2" fill="#D4A843"/>
  <circle cx="71" cy="5" r="2" fill="#D4A843"/>
  <circle cx="71" cy="9" r="2" fill="#D4A843"/>

  <!-- Corps (forme de 8 symetrique : upper bout, taille, lower bout) -->
  <path d="
    M 64 62
    C 78 62, 85 67, 85 73
    C 85 79, 77 84, 74 88
    C 80 91, 91 98, 91 108
    C 91 118, 78 124, 64 124
    C 50 124, 37 118, 37 108
    C 37 98, 48 91, 54 88
    C 51 84, 43 79, 43 73
    C 43 67, 50 62, 64 62 Z
  " fill="#D4934A" stroke="#8B6914" stroke-width="2"/>

  <!-- Rosace -->
  <circle cx="64" cy="80" r="9" fill="#3D300A" stroke="#5C4A0E" stroke-width="1.5"/>
  <circle cx="64" cy="80" r="7" fill="none" stroke="#D4A843" stroke-width="0.8"/>

  <!-- Chevalet -->
  <rect x="56" y="106" width="16" height="3" rx="1" fill="#5C4A0E"/>

  <!-- Cordes (6 cordes nylon) -->
  <line x1="59" y1="12" x2="59" y2="106" stroke="#E8D5A3" stroke-width="0.5" opacity="0.8"/>
  <line x1="61" y1="12" x2="61" y2="106" stroke="#E8D5A3" stroke-width="0.5" opacity="0.8"/>
  <line x1="63" y1="12" x2="63" y2="106" stroke="#E8D5A3" stroke-width="0.6" opacity="0.8"/>
  <line x1="65" y1="12" x2="65" y2="106" stroke="#E8D5A3" stroke-width="0.6" opacity="0.8"/>
  <line x1="67" y1="12" x2="67" y2="106" stroke="#E8D5A3" stroke-width="0.8" opacity="0.8"/>
  <line x1="69" y1="12" x2="69" y2="106" stroke="#E8D5A3" stroke-width="0.9" opacity="0.8"/>
</svg>
