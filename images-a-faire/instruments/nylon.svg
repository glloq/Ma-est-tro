<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Guitare classique (nylon) - GM 24 - rotation 45° -->
  <g transform="rotate(45, 64, 64)">

    <!-- Manche -->
    <rect x="58" y="8" width="12" height="56" rx="2" fill="#8B6914" stroke="#5C4A0E" stroke-width="1.5"/>

    <!-- Frettes -->
    <line x1="58" y1="18" x2="70" y2="18" stroke="#D4A843" stroke-width="1"/>
    <line x1="58" y1="27" x2="70" y2="27" stroke="#D4A843" stroke-width="1"/>
    <line x1="58" y1="35" x2="70" y2="35" stroke="#D4A843" stroke-width="1"/>
    <line x1="58" y1="42" x2="70" y2="42" stroke="#D4A843" stroke-width="1"/>
    <line x1="58" y1="48" x2="70" y2="48" stroke="#D4A843" stroke-width="1"/>

    <!-- Tete -->
    <rect x="56" y="2" width="16" height="10" rx="3" fill="#5C4A0E" stroke="#3D300A" stroke-width="1.5"/>
    <circle cx="58" cy="5" r="2" fill="#D4A843"/>
    <circle cx="58" cy="9" r="2" fill="#D4A843"/>
    <circle cx="70" cy="5" r="2" fill="#D4A843"/>
    <circle cx="70" cy="9" r="2" fill="#D4A843"/>

    <!-- Corps -->
    <path d="
      M 64 58
      C 78 58, 84 62, 84 69
      C 84 78, 80 84, 80 87
      C 80 90, 90 96, 90 104
      C 90 114, 78 120, 64 120
      C 50 120, 38 114, 38 104
      C 38 96, 48 90, 48 87
      C 48 84, 44 78, 44 69
      C 44 62, 50 58, 64 58 Z
    " fill="#D4934A" stroke="#8B6914" stroke-width="2"/>

    <!-- Rosace -->
    <circle cx="64" cy="76" r="8" fill="#3D300A" stroke="#5C4A0E" stroke-width="1.5"/>
    <circle cx="64" cy="76" r="6" fill="none" stroke="#D4A843" stroke-width="0.8"/>

    <!-- Chevalet -->
    <rect x="57" y="102" width="14" height="3" rx="1" fill="#5C4A0E"/>

    <!-- Cordes -->
    <line x1="59" y1="10" x2="59" y2="102" stroke="#E8D5A3" stroke-width="0.5" opacity="0.8"/>
    <line x1="61" y1="10" x2="61" y2="102" stroke="#E8D5A3" stroke-width="0.5" opacity="0.8"/>
    <line x1="63" y1="10" x2="63" y2="102" stroke="#E8D5A3" stroke-width="0.6" opacity="0.8"/>
    <line x1="65" y1="10" x2="65" y2="102" stroke="#E8D5A3" stroke-width="0.6" opacity="0.8"/>
    <line x1="67" y1="10" x2="67" y2="102" stroke="#E8D5A3" stroke-width="0.8" opacity="0.8"/>
    <line x1="69" y1="10" x2="69" y2="102" stroke="#E8D5A3" stroke-width="0.9" opacity="0.8"/>

  </g>
</svg>
