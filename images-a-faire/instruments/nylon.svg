<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Guitare classique (nylon) - Style flat/line-art -->

  <!-- Manche -->
  <rect x="58" y="8" width="12" height="60" rx="2" fill="#8B6914" stroke="#5C4A0E" stroke-width="1.5"/>

  <!-- Frettes -->
  <line x1="58" y1="20" x2="70" y2="20" stroke="#D4A843" stroke-width="1"/>
  <line x1="58" y1="30" x2="70" y2="30" stroke="#D4A843" stroke-width="1"/>
  <line x1="58" y1="39" x2="70" y2="39" stroke="#D4A843" stroke-width="1"/>
  <line x1="58" y1="47" x2="70" y2="47" stroke="#D4A843" stroke-width="1"/>
  <line x1="58" y1="54" x2="70" y2="54" stroke="#D4A843" stroke-width="1"/>

  <!-- Tete -->
  <rect x="55" y="2" width="18" height="10" rx="3" fill="#5C4A0E" stroke="#3D300A" stroke-width="1.5"/>
  <!-- Mecaniques -->
  <circle cx="57" cy="5" r="2" fill="#D4A843"/>
  <circle cx="57" cy="9" r="2" fill="#D4A843"/>
  <circle cx="71" cy="5" r="2" fill="#D4A843"/>
  <circle cx="71" cy="9" r="2" fill="#D4A843"/>

  <!-- Corps - partie superieure -->
  <ellipse cx="64" cy="78" rx="22" ry="16" fill="#D4934A" stroke="#8B6914" stroke-width="2"/>

  <!-- Corps - partie inferieure -->
  <ellipse cx="64" cy="104" rx="28" ry="20" fill="#D4934A" stroke="#8B6914" stroke-width="2"/>

  <!-- Rosace -->
  <circle cx="64" cy="82" r="9" fill="#3D300A" stroke="#5C4A0E" stroke-width="1.5"/>
  <circle cx="64" cy="82" r="7" fill="none" stroke="#D4A843" stroke-width="0.8"/>

  <!-- Chevalet -->
  <rect x="56" y="100" width="16" height="3" rx="1" fill="#5C4A0E"/>

  <!-- Cordes -->
  <line x1="60" y1="12" x2="60" y2="100" stroke="#E8D5A3" stroke-width="0.5" opacity="0.8"/>
  <line x1="62" y1="12" x2="62" y2="100" stroke="#E8D5A3" stroke-width="0.5" opacity="0.8"/>
  <line x1="64" y1="12" x2="64" y2="100" stroke="#E8D5A3" stroke-width="0.7" opacity="0.8"/>
  <line x1="66" y1="12" x2="66" y2="100" stroke="#E8D5A3" stroke-width="0.7" opacity="0.8"/>
  <line x1="68" y1="12" x2="68" y2="100" stroke="#E8D5A3" stroke-width="0.9" opacity="0.8"/>
</svg>
