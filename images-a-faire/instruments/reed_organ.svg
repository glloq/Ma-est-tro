<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Harmonium (orgue a anches) - GM 20 -->

    <!-- Meuble (petit orgue pose sur table) -->
    <rect x="14" y="28" width="100" height="68" rx="4" fill="#5C4A0E" stroke="#3D300A" stroke-width="2"/>

    <!-- Panneau decoratif superieur (ajoure) -->
    <rect x="20" y="32" width="88" height="18" rx="2" fill="#3D300A"/>
    <!-- Ajourages (grille de ventilation) -->
    <rect x="28" y="36" width="8" height="10" rx="1" fill="#5C4A0E"/>
    <rect x="40" y="36" width="8" height="10" rx="1" fill="#5C4A0E"/>
    <rect x="52" y="36" width="8" height="10" rx="1" fill="#5C4A0E"/>
    <rect x="64" y="36" width="8" height="10" rx="1" fill="#5C4A0E"/>
    <rect x="76" y="36" width="8" height="10" rx="1" fill="#5C4A0E"/>
    <rect x="88" y="36" width="8" height="10" rx="1" fill="#5C4A0E"/>

    <!-- Registres (tirettes au-dessus du clavier) -->
    <circle cx="28" cy="56" r="2.5" fill="#F5E6C8" stroke="#8B6914" stroke-width="0.8"/>
    <circle cx="38" cy="56" r="2.5" fill="#F5E6C8" stroke="#8B6914" stroke-width="0.8"/>
    <circle cx="48" cy="56" r="2.5" fill="#F5E6C8" stroke="#8B6914" stroke-width="0.8"/>
    <circle cx="58" cy="56" r="2.5" fill="#F5E6C8" stroke="#8B6914" stroke-width="0.8"/>
    <circle cx="68" cy="56" r="2.5" fill="#F5E6C8" stroke="#8B6914" stroke-width="0.8"/>
    <circle cx="78" cy="56" r="2.5" fill="#F5E6C8" stroke="#8B6914" stroke-width="0.8"/>
    <circle cx="88" cy="56" r="2.5" fill="#F5E6C8" stroke="#8B6914" stroke-width="0.8"/>
    <circle cx="98" cy="56" r="2.5" fill="#F5E6C8" stroke="#8B6914" stroke-width="0.8"/>

    <!-- Clavier -->
    <rect x="20" y="64" width="88" height="18" rx="1" fill="#F5F5F5" stroke="#CCC" stroke-width="1"/>
    <!-- Touches noires -->
    <rect x="28" y="64" width="3" height="10" fill="#111"/>
    <rect x="36" y="64" width="3" height="10" fill="#111"/>
    <rect x="48" y="64" width="3" height="10" fill="#111"/>
    <rect x="56" y="64" width="3" height="10" fill="#111"/>
    <rect x="64" y="64" width="3" height="10" fill="#111"/>
    <rect x="76" y="64" width="3" height="10" fill="#111"/>
    <rect x="84" y="64" width="3" height="10" fill="#111"/>
    <rect x="96" y="64" width="3" height="10" fill="#111"/>

    <!-- Genouilleres / soufflets (2 pedales sous le clavier) -->
    <rect x="30" y="86" width="26" height="6" rx="2" fill="#3D300A" stroke="#222" stroke-width="1"/>
    <rect x="72" y="86" width="26" height="6" rx="2" fill="#3D300A" stroke="#222" stroke-width="1"/>

    <!-- Pieds -->
    <rect x="18" y="96" width="4" height="16" rx="1" fill="#5C4A0E" stroke="#3D300A" stroke-width="1"/>
    <rect x="106" y="96" width="4" height="16" rx="1" fill="#5C4A0E" stroke="#3D300A" stroke-width="1"/>

    <!-- Pedales soufflantes -->
    <rect x="40" y="108" width="20" height="6" rx="2" fill="#8B6914" stroke="#5C4A0E" stroke-width="1"/>
    <rect x="68" y="108" width="20" height="6" rx="2" fill="#8B6914" stroke="#5C4A0E" stroke-width="1"/>

</svg>
