<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Vibraphone - GM 11 -->
  <g transform="rotate(20, 64, 64)">

    <!-- Cadre -->
    <line x1="14" y1="36" x2="114" y2="36" stroke="#888" stroke-width="2"/>

    <!-- Lames metalliques (graduees) -->
    <rect x="18" y="24" width="10" height="14" rx="2" fill="#C0C0C0" stroke="#999" stroke-width="1"/>
    <rect x="30" y="24" width="10" height="14" rx="2" fill="#B0B0B0" stroke="#999" stroke-width="1"/>
    <rect x="42" y="24" width="10" height="14" rx="2" fill="#C0C0C0" stroke="#999" stroke-width="1"/>
    <rect x="54" y="24" width="10" height="14" rx="2" fill="#B0B0B0" stroke="#999" stroke-width="1"/>
    <rect x="66" y="24" width="10" height="14" rx="2" fill="#C0C0C0" stroke="#999" stroke-width="1"/>
    <rect x="78" y="24" width="10" height="14" rx="2" fill="#B0B0B0" stroke="#999" stroke-width="1"/>
    <rect x="90" y="24" width="10" height="14" rx="2" fill="#C0C0C0" stroke="#999" stroke-width="1"/>
    <rect x="102" y="24" width="10" height="14" rx="2" fill="#B0B0B0" stroke="#999" stroke-width="1"/>

    <!-- Tubes resonateurs (en dessous) -->
    <rect x="19" y="40" width="8" height="44" rx="3" fill="#D4A843" stroke="#B8960F" stroke-width="1"/>
    <rect x="31" y="40" width="8" height="40" rx="3" fill="#D4A843" stroke="#B8960F" stroke-width="1"/>
    <rect x="43" y="40" width="8" height="36" rx="3" fill="#D4A843" stroke="#B8960F" stroke-width="1"/>
    <rect x="55" y="40" width="8" height="32" rx="3" fill="#D4A843" stroke="#B8960F" stroke-width="1"/>
    <rect x="67" y="40" width="8" height="28" rx="3" fill="#D4A843" stroke="#B8960F" stroke-width="1"/>
    <rect x="79" y="40" width="8" height="24" rx="3" fill="#D4A843" stroke="#B8960F" stroke-width="1"/>
    <rect x="91" y="40" width="8" height="20" rx="3" fill="#D4A843" stroke="#B8960F" stroke-width="1"/>
    <rect x="103" y="40" width="8" height="16" rx="3" fill="#D4A843" stroke="#B8960F" stroke-width="1"/>

    <!-- Pieds -->
    <line x1="24" y1="84" x2="20" y2="98" stroke="#888" stroke-width="3" stroke-linecap="round"/>
    <line x1="104" y1="66" x2="108" y2="80" stroke="#888" stroke-width="3" stroke-linecap="round"/>

    <!-- Pedale -->
    <rect x="54" y="92" width="20" height="5" rx="2" fill="#888" stroke="#666" stroke-width="1"/>

    <!-- Mailloches -->
    <line x1="34" y1="10" x2="44" y2="24" stroke="#8B6914" stroke-width="2" stroke-linecap="round"/>
    <circle cx="44" cy="24" r="3.5" fill="#F5E6C8" stroke="#D4A843" stroke-width="1"/>
    <line x1="86" y1="10" x2="76" y2="24" stroke="#8B6914" stroke-width="2" stroke-linecap="round"/>
    <circle cx="76" cy="24" r="3.5" fill="#F5E6C8" stroke="#D4A843" stroke-width="1"/>

