    <rect x="92" y="56" width="3" height="8" fill="#111"/>
    <rect x="100" y="56" width="3" height="8" fill="#111"/>

    <!-- Clavier inferieur -->
    <rect x="16" y="72" width="96" height="14" rx="1" fill="#F5F5F5" stroke="#CCC" stroke-width="0.8"/>
    <rect x="24" y="72" width="3" height="8" fill="#111"/>
