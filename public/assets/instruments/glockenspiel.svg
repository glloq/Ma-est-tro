<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Glockenspiel - GM 9 -->

    <!-- Coffret -->
    <rect x="14" y="32" width="100" height="72" rx="4" fill="#333" stroke="#222" stroke-width="2"/>

    <!-- Interieur -->
    <rect x="18" y="36" width="92" height="64" rx="2" fill="#444"/>

    <!-- Lames metalliques (2 rangees, comme un clavier) -->
    <!-- Rangee du bas (naturelles) -->
    <rect x="22" y="60" width="8" height="36" rx="1" fill="#C0C0C0" stroke="#999" stroke-width="0.8"/>
    <rect x="32" y="60" width="8" height="34" rx="1" fill="#C0C0C0" stroke="#999" stroke-width="0.8"/>
    <rect x="42" y="60" width="8" height="32" rx="1" fill="#C0C0C0" stroke="#999" stroke-width="0.8"/>
    <rect x="52" y="60" width="8" height="30" rx="1" fill="#C0C0C0" stroke="#999" stroke-width="0.8"/>
    <rect x="62" y="60" width="8" height="28" rx="1" fill="#C0C0C0" stroke="#999" stroke-width="0.8"/>
    <rect x="72" y="60" width="8" height="26" rx="1" fill="#C0C0C0" stroke="#999" stroke-width="0.8"/>
    <rect x="82" y="60" width="8" height="24" rx="1" fill="#C0C0C0" stroke="#999" stroke-width="0.8"/>
    <rect x="92" y="60" width="8" height="22" rx="1" fill="#C0C0C0" stroke="#999" stroke-width="0.8"/>

    <!-- Rangee du haut (dieses) -->
    <rect x="28" y="40" width="7" height="18" rx="1" fill="#E0E0E0" stroke="#AAA" stroke-width="0.8"/>
    <rect x="38" y="40" width="7" height="17" rx="1" fill="#E0E0E0" stroke="#AAA" stroke-width="0.8"/>
    <rect x="58" y="40" width="7" height="15" rx="1" fill="#E0E0E0" stroke="#AAA" stroke-width="0.8"/>
    <rect x="68" y="40" width="7" height="14" rx="1" fill="#E0E0E0" stroke="#AAA" stroke-width="0.8"/>
    <rect x="78" y="40" width="7" height="13" rx="1" fill="#E0E0E0" stroke="#AAA" stroke-width="0.8"/>

    <!-- Mailloches -->
    <line x1="36" y1="18" x2="42" y2="40" stroke="#8B6914" stroke-width="2" stroke-linecap="round"/>
    <circle cx="42" cy="40" r="3" fill="#F5E6C8" stroke="#D4A843" stroke-width="1"/>
    <line x1="84" y1="18" x2="78" y2="40" stroke="#8B6914" stroke-width="2" stroke-linecap="round"/>
    <circle cx="78" cy="40" r="3" fill="#F5E6C8" stroke="#D4A843" stroke-width="1"/>

</svg>
