<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Guitare jazz archtop - GM 26 - rotation 45° -->
  <g transform="rotate(45, 64, 64)">

    <!-- Manche -->
    <rect x="58" y="8" width="12" height="52" rx="2" fill="#8B6914" stroke="#5C4A0E" stroke-width="1.5"/>

    <!-- Frettes -->
    <line x1="58" y1="18" x2="70" y2="18" stroke="#D4A843" stroke-width="1"/>
    <line x1="58" y1="26" x2="70" y2="26" stroke="#D4A843" stroke-width="1"/>
    <line x1="58" y1="33" x2="70" y2="33" stroke="#D4A843" stroke-width="1"/>
    <line x1="58" y1="39" x2="70" y2="39" stroke="#D4A843" stroke-width="1"/>
    <line x1="58" y1="44" x2="70" y2="44" stroke="#D4A843" stroke-width="1"/>

    <!-- Tete -->
    <rect x="55" y="2" width="18" height="10" rx="3" fill="#5C4A0E" stroke="#3D300A" stroke-width="1.5"/>
    <circle cx="57" cy="5" r="2" fill="#D4A843"/>
    <circle cx="57" cy="9" r="2" fill="#D4A843"/>
    <circle cx="71" cy="5" r="2" fill="#D4A843"/>
    <circle cx="71" cy="9" r="2" fill="#D4A843"/>

    <!-- Corps archtop (plus large, plus rond) -->
    <path d="
      M 64 54
      C 80 54, 88 60, 88 68
      C 88 78, 82 84, 82 87
      C 82 90, 94 96, 94 106
      C 94 116, 80 122, 64 122
      C 48 122, 34 116, 34 106
      C 34 96, 46 90, 46 87
      C 46 84, 40 78, 40 68
      C 40 60, 48 54, 64 54 Z
    " fill="#C17D2F" stroke="#8B6914" stroke-width="2"/>

    <!-- Binding -->
    <path d="
      M 64 56
      C 79 56, 86 61, 86 68
      C 86 77, 81 83, 81 86
      C 81 89, 92 95, 92 106
      C 92 115, 79 120, 64 120
      C 49 120, 36 115, 36 106
      C 36 95, 47 89, 47 86
      C 47 83, 42 77, 42 68
      C 42 61, 49 56, 64 56 Z
    " fill="none" stroke="#F0E6D3" stroke-width="0.8" opacity="0.5"/>

    <!-- Ouie F gauche -->
    <path d="M 50 72 C 48 76, 48 80, 50 84 C 52 80, 52 76, 50 78" fill="none" stroke="#3D300A" stroke-width="1.8" stroke-linecap="round"/>

    <!-- Ouie F droite -->
    <path d="M 78 72 C 80 76, 80 80, 78 84 C 76 80, 76 76, 78 78" fill="none" stroke="#3D300A" stroke-width="1.8" stroke-linecap="round"/>

    <!-- Pickguard -->
    <path d="M 42 74 C 44 82, 48 90, 56 96 L 56 82 C 50 78, 44 74, 42 74 Z" fill="#1A1A1A" opacity="0.2"/>

    <!-- Micro humbucker -->
    <rect x="54" y="68" width="20" height="5" rx="2" fill="#2C2C2C" stroke="#1A1A1A" stroke-width="0.8"/>

    <!-- Chevalet flottant -->
    <rect x="54" y="100" width="20" height="3" rx="1" fill="#5C4A0E"/>

    <!-- Cordier trapeze -->
    <path d="M 54 116 L 50 122 L 78 122 L 74 116 Z" fill="#D4A843" stroke="#8B6914" stroke-width="0.8"/>

    <!-- Cordes -->
    <line x1="59" y1="10" x2="57" y2="116" stroke="#E8D5A3" stroke-width="0.5" opacity="0.7"/>
    <line x1="61" y1="10" x2="60" y2="116" stroke="#E8D5A3" stroke-width="0.5" opacity="0.7"/>
    <line x1="63" y1="10" x2="62" y2="116" stroke="#E8D5A3" stroke-width="0.6" opacity="0.7"/>
    <line x1="65" y1="10" x2="66" y2="116" stroke="#E8D5A3" stroke-width="0.6" opacity="0.7"/>
    <line x1="67" y1="10" x2="68" y2="116" stroke="#E8D5A3" stroke-width="0.7" opacity="0.7"/>
    <line x1="69" y1="10" x2="71" y2="116" stroke="#E8D5A3" stroke-width="0.8" opacity="0.7"/>

  </g>
</svg>
