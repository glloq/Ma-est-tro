      M 10 56 C 10 50, 20 46, 64 46 C 108 46, 118 50, 118 56
      L 118 72
      C 118 78, 108 82, 64 82 C 20 82, 10 78, 10 72 Z
    " fill="#D4934A" stroke="#8B6914" stroke-width="2"/>

    <!-- Surface superieure -->
