    <!-- Ecrou papillon -->
    <path d="M 60 56 L 64 52 L 68 56 L 64 60 Z" fill="#888" stroke="#666" stroke-width="1"/>

    <!-- Trepied (base) -->
    <line x1="64" y1="116" x2="44" y2="124" stroke="#888" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="64" y1="116" x2="84" y2="124" stroke="#888" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="64" y1="116" x2="64" y2="126" stroke="#888" stroke-width="2.5" stroke-linecap="round"/>

</svg>
