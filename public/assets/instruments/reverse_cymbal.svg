    <!-- Dome central (bell) -->
    <ellipse cx="64" cy="50" rx="12" ry="5" fill="#E8C84A" stroke="#B8960F" stroke-width="1.5"/>

    <!-- Reflets -->
    <path d="M 30 46 C 40 40, 60 38, 80 42" fill="none" stroke="#E8C84A" stroke-width="1" opacity="0.4"/>
    <path d="M 36 56 C 48 52, 72 50, 92 54" fill="none" stroke="#E8C84A" stroke-width="1" opacity="0.3"/>

    <!-- Bord -->
    <ellipse cx="64" cy="52" rx="46" ry="18" fill="none" stroke="#8B6914" stroke-width="1" opacity="0.5"/>

    <!-- Tige / stand -->
