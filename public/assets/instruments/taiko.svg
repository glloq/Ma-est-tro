<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Taiko - GM 116 -->

    <!-- Fut (tonneau horizontal) -->
    <ellipse cx="64" cy="72" rx="44" ry="32" fill="#8B6914" stroke="#5C4A0E" stroke-width="2"/>

