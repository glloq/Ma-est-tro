<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Timbales d'orchestre - GM 47 -->
  <g transform="rotate(45, 64, 64)">

    <!-- Fut (bol en cuivre) -->
    <path d="
      M 28 56
      C 28 88, 44 104, 64 104
      C 84 104, 100 88, 100 56
    " fill="#B87333" stroke="#8B5A2B" stroke-width="2"/>

    <!-- Cercle de tension -->
    <ellipse cx="64" cy="56" rx="38" ry="14" fill="none" stroke="#D4A843" stroke-width="3"/>

    <!-- Peau (membrane) -->
    <ellipse cx="64" cy="56" rx="36" ry="12" fill="#F5E6C8" stroke="#D4A843" stroke-width="1"/>

    <!-- Pedale (en bas) -->
    <rect x="58" y="104" width="12" height="8" rx="2" fill="#666" stroke="#444" stroke-width="1"/>
    <rect x="56" y="112" width="16" height="4" rx="2" fill="#888" stroke="#666" stroke-width="1"/>

    <!-- Pieds -->
    <line x1="36" y1="96" x2="30" y2="116" stroke="#666" stroke-width="3" stroke-linecap="round"/>
    <line x1="92" y1="96" x2="98" y2="116" stroke="#666" stroke-width="3" stroke-linecap="round"/>

    <!-- Baguettes -->
    <line x1="44" y1="18" x2="56" y2="52" stroke="#8B6914" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="56" cy="52" r="4" fill="#F5E6C8" stroke="#D4A843" stroke-width="1"/>
    <line x1="84" y1="18" x2="72" y2="52" stroke="#8B6914" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="72" cy="52" r="4" fill="#F5E6C8" stroke="#D4A843" stroke-width="1"/>

  </g>
</svg>
